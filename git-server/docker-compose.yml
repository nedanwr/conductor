# Local Postgres for development. SPEC §4.1: dev == prod (Postgres both places).
services:
  postgres:
    image: postgres:17
    container_name: git-server-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gitserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitserver}
      POSTGRES_DB: ${POSTGRES_DB:-gitserver}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - git_server_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitserver}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  git_server_pgdata:
