version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/nedanwr/conductor/git-server/internal/gen
plugins:
  - local: ["go", "tool", "protoc-gen-go"]
    out: internal/gen
    opt: paths=source_relative
  - local: ["go", "tool", "protoc-gen-connect-go"]
    out: internal/gen
    opt: paths=source_relative
